<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock, Paper, Scissors, Lizard, Spock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
 <div class="container text-center mt-4">
  <h1>Rock, Paper, Scissors, Lizard, Spock</h1>

  <img 
    src="https://i.pinimg.com/564x/ce/65/6a/ce656ad21c802346b8e1f14261b12f17.jpg" 
    class="img-fluid rounded mt-3" 
    alt="Game image"
  />

  <h3 class="mt-4">Choose your option:</h3>

  <div class="mt-3">
    <button class="btn btn-secondary m-2 choice-btn" data-choice="rock">Rock</button>
    <button class="btn btn-secondary m-2 choice-btn" data-choice="paper">Paper</button>
    <button class="btn btn-secondary m-2 choice-btn" data-choice="scissors">Scissors</button>
    <button class="btn btn-secondary m-2 choice-btn" data-choice="lizard">Lizard</button>
    <button class="btn btn-secondary m-2 choice-btn" data-choice="spock">Spock</button>
  </div>

  <div class="mt-4">
    <p id="user-choice">User chose:</p>
    <p id="computer-choice">Computer chose:</p>
    <h2 id="result"></h2>
  </div>

  <div class="mt-5">
    Made with ❤️ by Monkeyjp
  </div>
</div>
  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
    integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK"
    crossorigin="anonymous"></script>
</body>

</html>
